name: Build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            script: mac64
          - arch: arm64
            script: mac-arm

    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build & Package macOS
        run: npm run build:${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload zip artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-zip-${{ matrix.arch }}
          path: release/*-${{ matrix.arch }}.zip
          retention-days: 30

      - name: Upload dmg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-${{ matrix.arch }}
          path: release/*-${{ matrix.arch }}.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build & Package Windows
        run: npm run build:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            release/*.exe
            release/*.zip
          retention-days: 30

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: false

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare changelog
        id: changelog
        run: |
          CHANGELOG_FILE="CHANGELOG.md"
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"

          # 精确匹配版本标题行，提取到下一个版本之前的内容
          CHANGELOG_CONTENT=$(awk -v version="[$TAG_VERSION]" -v date="[0-9]{4}-[0-9]{2}-[0-9]{2}" '
            BEGIN { found=0 }
            # 精确匹配版本行
            $0 == version { found=1; next }
            # 遇到下一个版本标题时退出
            found && /^## \[.*\]/ { found=0; exit }
            found { print }
          ' "$CHANGELOG_FILE")

          if [ -z "$CHANGELOG_CONTENT" ]; then
            echo "body=${TAG_VERSION} 更新内容" >> $GITHUB_OUTPUT
          else
            # 转义并格式化
            BODY=$(echo "$CHANGELOG_CONTENT" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
            echo "body=${BODY}" >> $GITHUB_OUTPUT
          fi

          echo "版本: $TAG_VERSION"
          echo "更新日志:"
          echo "$CHANGELOG_CONTENT"

      - name: Collect all files
        run: |
          mkdir -p release-files
          cp artifacts/windows-artifacts/*.exe release-files/ 2>/dev/null || true
          cp artifacts/windows-artifacts/*.zip release-files/ 2>/dev/null || true
          cp artifacts/mac-zip-*/*.zip release-files/ 2>/dev/null || true
          cp artifacts/mac-dmg-*/*.dmg release-files/ 2>/dev/null || true
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          body: ${{ steps.changelog.outputs.body }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}